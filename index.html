<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
	.red{
		color:red;
	}
	.blue{
		color:blue;
	}
    </style>
</head>
<script>

function createClassName(){
	const ulList = document.querySelectorAll('ul');
	ulList.forEach((element)=>{
		
		if(element.id == 'HTMLCollectionUl'){
			element.childNodes.forEach((element)=>{
				element.className = 'red';
			});
		}else{
			element.childNodes.forEach((element)=>{
				element.className = 'blue';
			});
			
		}
	});
}

</script>
<body onload="createClassName();">
	<h1>HTMLCollection과 NodeList의 차이점</h1>
	<h1>HTMLCollection</h1>
	<ul id="HTMLCollectionUl">
		<li>고양이</li>
		<li>강아지</li>
		<li>판다</li>
		<li>햄스터</li>
	</ul>
	<button id="HTMLCollectionBtn">클릭</button>
	<p>
	설명글 : HTMLCollection은 live 콜렉션으로 배열 내의 변경사항이 실시간으로 적용된다.<br>
	<span id="HTMLCollectionSpan"></span>
	</p>

	<h1>NodeList</h1>
	<ul id="NodeListUl">
		<li>고양이</li>
		<li>강아지</li>
		<li>판다</li>
		<li>햄스터</li>
	</ul>
	<button id="NodeListBtn">클릭</button>
	<p>
	설명글 : NodeList는 Static 콜렉션으로 배열 내의 변경사항이 실시간으로 적용되지 않는다.<br>
	<span id="NodeListSpan"></span>
	</p>

	<button id="locationBtn">다음</button>

<script>
const buttones = document.querySelectorAll('button');
buttones.forEach((element)=>{
	element.addEventListener('click', changeToColor);
});
locationBtn.addEventListener('click', locationToMove);

function locationToMove(){
	location.href="./variable.html";
}



function changeToColor(e){
	if(e.target.id == 'HTMLCollectionBtn'){
		const list = document.getElementsByClassName('red');
		for(let i=0; i<list.length; i++){
			const br = document.createElement('br');
			setTimeout(()=>{
				list[i].className = 'blue';
				if(i != 0)
					HTMLCollectionSpan.appendChild(br);
				HTMLCollectionSpan.append(i + ' 번째 변경완료 =>' + '현재 HTMLCollection['+i+'] ' + list[i].innerHTML);
				
			}, 1000*i);
		}
	}else if(e.target.id == 'NodeListBtn'){
		const list = document.querySelectorAll('#NodeListUl li');
		
		list.forEach((element, i)=>{
			const br = document.createElement('br');
			setTimeout(()=>{
				element.className = 'red';
				if(i != 0)
					NodeListSpan.appendChild(br);
				NodeListSpan.append(i + ' 번째 변경완료 =>' + '현재 NodeList['+i+'] ' + element.innerHTML);		
			}, 1000*i);			
		});

	}
}
</script>
</body>
</html>
