<!DOCTYPE html>
<head>

<style>
.img{
	width : 100px;
}
input:focus { outline: none; }
</style>
</head>
<body>
	
	<img class="img" src="C:\Users\USER\Desktop\테스트이미지\cat-8157889_640.jpg" name="이미지_제목_내용_링크정보">
	<img class="img" src="C:\Users\USER\Desktop\테스트이미지\animal.jpg" name="동영상_링크정보">
	<img class="img" src="C:\Users\USER\Desktop\테스트이미지\images_kimkevin90_post_276acf3c-0e4a-4b20-bc3c-1b78963d1637_tree1.jpg" name="이미지_제목_내용_링크정보">
	<img class="img" src="C:\Users\USER\Desktop\테스트이미지\다운로드.jpg" name="이미지_제목_내용_링크정보">
	

	<table id="creating">
		<thead>
		<tr>
			<th>이미지</th>
			<th>유형</th>
			<th>비고</th>
		</tr>
		</thead>
		<tbody>
		</tbody>
	<table>
<script>
   const imges = document.querySelectorAll('img');
   imges.forEach((element)=>{
	element.addEventListener('click', imgClick);
   });

   function imgClick(e){
	const createImg = document.createElement('img');
	const createButton = document.createElement('button');
	const createInput = document.createElement('input');
	const buttonText = document.createTextNode('삭제');
	const table = document.querySelector('#creating tbody');
	const tr = document.createElement('tr');

	const imgTd = document.createElement('td');
	const typeTd = document.createElement('td');
	const remarkTd = document.createElement('td');
	
	
	createInput.value = e.target.name;
	createInput.className = 'border-0';
	createInput.name = 'type';
	createInput.readOnly = true;

	createImg.src = e.target.src;
	createImg.className = 'img';
	createButton.className = 'btn btn-danger';
	createButton.appendChild(buttonText);
	createButton.onclick = removeImg;

	imgTd.appendChild(createImg);
	typeTd.appendChild(createInput);
	remarkTd.appendChild(createButton);
	tr.appendChild(imgTd);
	tr.appendChild(typeTd);
	tr.appendChild(remarkTd);
	table.appendChild(tr);
   }
   
   function removeImg(e){
	e.target.parentNode.parentNode.remove();
  }
</script>
</body>
</html>
