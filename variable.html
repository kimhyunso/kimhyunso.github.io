<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
	.red{
		color:red;
	}
	.blue{
		color:blue;
	}
    </style>
</head>
<body>
    <h1>호이스팅 및 변수들의 차이점</h1>
	<h1>var 변수 (비권장)</h1>
    <button id="varBtn" name="hoisting">실행</button>
    <button id="againVarBtn" name="again">같은 변수명으로 다시 만들기</button>

    <h1>const 변수 (상수)</h1>
    <button id="constBtn" name="hoisting">실행</button>
    <button id="againConstBtn" name="again">같은 변수명으로 다시 만들기</button>


    <h1>let 변수 (권장)</h1>
    <button id="letBtn" name="hoisting">실행</button>
    <button id="againLetBtn" name="again">같은 변수명으로 다시 만들기</button>

    <h2>변수들 결과</h2>
    <p id="hoisting"></p>
    <hr>

    <button onclick="functionHoisting(event);">함수 실행</button>
    <button onclick="functionVariableError(event);">변수로 선언된 함수 실행</button>
    <button onclick="functionVariable(event);">변수로 선언된 함수 정상 실행</button>
    <h2>함수들 결과</h2>
    <p id="functionResult"></p>

    <button onclick="prev();">이전</button>
    <button onclick="next();">다음</button>
<script>
const hoistingButton = document.querySelectorAll("button[name='hoisting']");
const againButtons = document.querySelectorAll("button[name='again']");
hoistingButton.forEach((element)=>{
    element.addEventListener('click', variableClick);
});
againButtons.forEach((element)=>{
    element.addEventListener('click', againClick);
});

function variableClick(e){
    hoisting.innerHTML = "";
    if(e.target.id == 'varBtn'){
        try{
            hoisting.append(variable); 
            var variable = 1;
        }catch(err){
            hoisting.append(err); 
        }
        
    }else if(e.target.id == 'constBtn'){
        try{
            hoisting.append(variable); 
            const variable = 1;
        }catch(err){
            hoisting.append(err); 
        }
    }else if(e.target.id == 'letBtn'){
        try{
            hoisting.append(variable); 
            let variable = 1;
        }catch(err){
            hoisting.append(err); 
        }
    }
}



function againClick(e){
    hoisting.innerHTML = "";
    try{
        if(e.target.id == 'againVarBtn'){
            var variable = 1;
        }else if(e.target.id == 'againConstBtn'){
            const variable = 1;
        }else if(e.target.id == 'againLetBtn'){
            let variable = 1;
        }
        hoisting.append(variable); 
    }catch(err){
        hoisting.append(err);
    }
}


function functionHoisting(e){
    functionResult.innerHTML = "";
    try{
        underFunction();
    }catch(err){
        functionResult.append(err);
    }
    
}

function functionVariableError(e){
    functionResult.innerHTML = "";
    try{
        func();
    }catch(err){
        functionResult.append(err);
    }
    
}


function underFunction(){
    functionResult.append('후에 만들어진 함수 실행');
}

const func = function(){
    functionResult.append('후에 만들어진 함수 실행');
};

function prev(){
    window.history.back();
}

function next(){
    location.href = "./seletor.html";
}


function functionVariable(e){
    func();
}

</script>
</body>
</html>
