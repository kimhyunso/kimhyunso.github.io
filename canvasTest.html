<!doctype html>
<html>
  <head>
<meta charset="utf-8" />
<script type="application/javascript">
function draw(w, h) {
	let canvas = document.getElementById("canvas");
	let color = 'rgb(0, 51, 153)';
	let size = 50;
	let width = innerWidth / 2;
	
  	 if (canvas.getContext) {
       	let ctx = canvas.getContext("2d");
       	//ctx.lineWidth=0;
       	
	  	ctx.beginPath();
	  	ctx.fillStyle = color;
       	ctx.arc(width + size/2, size+50, size, 0, Math.PI * 2, true);
       	
       	ctx.stroke();
      	ctx.fill();
      	
      	rightSide(ctx, color, size, width);
      	leftSide(ctx, color, size, width);
      	
    	
      }
}

function rightSide(ctx, color, size, width){
	ctx.beginPath();
	for (let i=100; i<=200; i+=100){
		ctx.arc(width + size/2 + i, size+50 + i, size, 0, Math.PI * 2, true);
	}
	ctx.stroke();
  	ctx.fill();
 
}

function leftSide(ctx, color, size, width){
	ctx.beginPath();
	for (let i=100; i<=200; i+=100){
		ctx.arc(width - size/2 - i, size+50 + i, size, 0, Math.PI * 2, true);
	}
	ctx.stroke();
  	ctx.fill();
}

</script>
</head>
  <body onload="draw(1950, 950);">
    <canvas id="canvas" width="1900" height="900"></canvas>
  </body>
</html>
